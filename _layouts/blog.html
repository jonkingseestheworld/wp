---
layout: default
---
<div class="blog">
  <h1 class="page-heading">{{ page.title }}</h1>
  {{ content }}

  <p class="blog-post-list">
    {% for post in site.posts %}
      {% if post.draft != true %}
        <span class="blog-post-date">{{ post.date | date: "%Y/%m/%d" }}</span>
        <a href="{{ post.url | replace:".html","" | prepend: site.baseurl }}" class="blog-post-title">
          {{ post.title }}
        </a>
        <br />
      {% endif %}
    {% endfor %}
  </p>

  <br />

  <h2 class="sub-title">Featured in other media</h2>
  <p class="media-post-list">
    {% for item in page.items %}
     <span class="blog-post-date">{{ item.date }}</span> &nbsp;
        <a href="{{ item.link }}" class="blog-post-title" target="_blank" rel="noopener noreferrer">
        {{ item.title }}
        </a>
        <br />
    {% endfor %}
  </p>
</div>
