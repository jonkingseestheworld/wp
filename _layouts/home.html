---
layout: default
---
<div class="typewriter-container">
  <h1 class="welcome-typewriter"><span id="typewriter-text"></span><span class="tw-cursor">_</span></h1>
</div>
<h2 class="home_title hm_tt_1">RESEARCH &amp; DATA SCIENTIST, PhD</h2>
<br>
<!-- <h2 class="home_title hm_tt_2">  </h2> -->

<div class="home">
  <img
    src="{{ page.profile_picture.src | absolute_url }}"
    alt="{{ page.profile_picture.alt }}"
    class="profilepic"
  />

  {{ content }}
</div>

<script>
(function() {
  var texts = ['Hi there!', 'My name is Johnny', 'Thanks for dropping by!'];
  var el = document.getElementById('typewriter-text');
  if (!el) return;
  var textIndex = 0, charIndex = 0, isDeleting = false;

  function tick() {
    var current = texts[textIndex];
    el.textContent = isDeleting ? current.slice(0, charIndex--) : current.slice(0, charIndex++);
    var delay = isDeleting ? 60 : 100;
    if (!isDeleting && charIndex > current.length) {
      isDeleting = true;
      delay = 1500;
    } else if (isDeleting && charIndex < 0) {
      isDeleting = false;
      textIndex = (textIndex + 1) % texts.length;
      charIndex = 0;
      delay = 400;
    }
    setTimeout(tick, delay);
  }

  setTimeout(tick, 600);
})();
</script>
